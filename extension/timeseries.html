<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Climate — Timeseries Explorer</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=3">
</head>
<body>

<div id="setup-screen" class="setup-screen" style="display:none;">
  <h2>Visual Climate — Timeseries Explorer</h2>
  <p style="margin-bottom:16px;color:var(--vc-text-secondary);font-size:12px;">Supabase 연결 정보 입력</p>
  <input type="text" id="input-url" placeholder="Supabase URL">
  <input type="text" id="input-key" placeholder="Supabase Key">
  <button id="btn-save-config">Connect</button>
  <p id="setup-error" style="color:var(--vc-talker);font-size:11px;margin-top:8px;"></p>
</div>

<div id="loading" class="loading" style="display:none;">
  <div class="spinner"></div>
  <span>Loading time-series data...</span>
</div>

<div id="empty-state" class="empty-state" style="display:none;">
  <p>Select a country to explore its climate time-series.</p>
</div>

<div id="ts-main" style="display:none;">
  <!-- Country Header -->
  <div class="ts-header">
    <span id="ts-flag" class="ts-header-flag"></span>
    <span id="ts-name" class="ts-header-name"></span>
    <span id="ts-iso3" class="ts-header-iso"></span>
  </div>

  <!-- Controls -->
  <div class="ts-controls" style="padding:var(--sp-3) var(--sp-4);">
    <select id="ts-group">
      <option value="emissions">Emissions</option>
      <option value="fuel">Fuel Breakdown</option>
      <option value="sector">Sector (Climate TRACE)</option>
      <option value="energy">Energy</option>
      <option value="economy">Economy</option>
      <option value="resilience">Resilience</option>
      <option value="other_ghg">Other GHG</option>
    </select>
    <select id="ts-indicator"></select>
  </div>

  <!-- Chart Area (pure SVG) -->
  <div id="ts-chart" class="ts-chart-area"></div>

  <!-- Data Table -->
  <div id="ts-table" style="padding:var(--sp-2) var(--sp-4);overflow-x:auto;"></div>

  <div class="vc-footer">
    Data: <a href="https://visualclimate.org" target="_blank">visualclimate.org</a> Supabase
  </div>
</div>

<!-- Chart Tooltip -->
<div id="chart-tooltip" class="chart-tooltip"></div>

<script src="tableau.extensions.1.latest.js"></script>
<script src="shared.js?v=2"></script>
<script src="timeseries-app.js?v=2"></script>
</body>
</html>
