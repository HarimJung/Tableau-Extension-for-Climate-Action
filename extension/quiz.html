<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Climate — 3-Minute Climate Test</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,600&family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FAFAF7;
      --surface: #F5F5F0;
      --surface-hover: #EFEFE8;
      --border: rgba(14,14,14,0.12);
      --text: #0E0E0E;
      --text-secondary: #555555;
      --text-muted: #9A9A9A;
      --primary: #C2410C;
      --primary-subtle: rgba(194,65,12,0.08);
      --success: #0B6B3A;
      --success-subtle: rgba(11,107,58,0.08);
      --danger: #8B1C1C;
      --danger-subtle: rgba(139,28,28,0.08);
      --warning: #B45309;
      --radius: 12px;
      --radius-sm: 8px;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(14,14,14,0.04) 1px, transparent 1px);
      background-size: 3px 3px;
      mix-blend-mode: multiply;
      opacity: 0.55;
    }

    .quiz-container {
      width: 100%;
      max-width: 480px;
      position: relative;
    }

    /* Progress */
    .quiz-progress {
      display: flex;
      gap: 6px;
      margin-bottom: 32px;
    }
    .quiz-progress-segment {
      flex: 1;
      height: 3px;
      border-radius: 1.5px;
      background: var(--border);
      transition: background 0.4s ease;
    }
    .quiz-progress-segment.done { background: var(--primary); }
    .quiz-progress-segment.active { background: var(--primary); opacity: 0.5; }

    /* Intro screen */
    .quiz-intro {
      text-align: left;
      animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .quiz-intro-icon {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 24px;
      opacity: 0.72;
    }
    .quiz-intro h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-optical-sizing: auto;
      font-size: clamp(24px, 7vw, 32px);
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1.12;
      margin-bottom: 12px;
      color: var(--text);
    }
    .quiz-intro h1 span { color: var(--primary); }
    .quiz-intro p {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.55;
      margin-bottom: 32px;
      font-weight: 400;
    }
    .quiz-intro .quiz-source {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 24px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Question */
    .quiz-question {
      animation: fadeUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .quiz-question-number {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 16px;
    }
    .quiz-question-text {
      font-family: 'Fraunces', Georgia, serif;
      font-optical-sizing: auto;
      font-size: clamp(19px, 5.8vw, 23px);
      font-weight: 400;
      letter-spacing: -0.018em;
      line-height: 1.18;
      margin-bottom: 24px;
    }

    /* Options */
    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-bottom: 20px;
      border-top: 1px solid rgba(14,14,14,0.18);
    }
    .quiz-option {
      display: flex;
      align-items: baseline;
      gap: 16px;
      padding: 14px 4px 14px 2px;
      border: none;
      border-bottom: 1px solid rgba(14,14,14,0.09);
      border-radius: 0;
      background: transparent;
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: transform 0.28s cubic-bezier(0.2, 0.8, 0.2, 1),
                  color 0.2s ease;
    }
    .quiz-option:hover:not(:disabled) {
      transform: translateX(7px);
      color: var(--primary);
    }
    .quiz-option:active:not(:disabled) { transform: scale(0.98); }
    .quiz-option:disabled { cursor: default; }
    .quiz-option:disabled:hover { transform: none; color: inherit; }
    .quiz-option .quiz-option-letter {
      width: auto; height: auto;
      border-radius: 0;
      background: transparent;
      color: var(--text);
      opacity: 0.45;
      display: flex; align-items: center; justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px; font-weight: 500;
      flex-shrink: 0;
      letter-spacing: 0.06em;
      transition: color 0.2s ease, opacity 0.2s ease;
    }
    .quiz-option:hover:not(:disabled) .quiz-option-letter {
      color: var(--primary);
      opacity: 1;
    }
    .quiz-option.correct {
      color: var(--text);
    }
    .quiz-option.correct .quiz-option-letter {
      color: var(--success); opacity: 1; font-weight: 700;
    }
    .quiz-option.correct > span:last-child {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 600;
      text-decoration: underline;
      text-decoration-color: var(--success);
      text-decoration-thickness: 2px;
      text-underline-offset: 5px;
    }
    .quiz-option.wrong {
      opacity: 0.6;
    }
    .quiz-option.wrong > span:last-child {
      text-decoration: line-through;
      text-decoration-color: rgba(139,28,28,0.55);
      text-decoration-thickness: 1.5px;
    }
    .quiz-option.wrong .quiz-option-letter {
      background: transparent; color: var(--danger); opacity: 0.7;
    }

    /* Feedback */
    .quiz-feedback {
      padding: 14px 0 0 0;
      border-top: 1px solid rgba(14,14,14,0.14);
      border-radius: 0;
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-size: 12.5px;
      line-height: 1.55;
      font-weight: 400;
      animation: fadeUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
      margin-bottom: 16px;
      margin-top: 12px;
    }
    .quiz-feedback.correct {
      background: transparent;
      color: var(--text-secondary);
      border-left: none;
    }
    .quiz-feedback.wrong {
      background: transparent;
      color: var(--text-secondary);
      border-left: none;
    }

    /* Big number reveal */
    .quiz-reveal {
      text-align: left;
      padding: 16px 0;
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .quiz-reveal-value {
      font-family: 'Fraunces', Georgia, serif;
      font-optical-sizing: auto;
      font-size: clamp(48px, 14vw, 64px);
      font-weight: 900;
      color: var(--text);
      line-height: 1;
      letter-spacing: -0.03em;
    }
    .quiz-reveal-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 8px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    /* Wrong percentage bar */
    .quiz-wrong-bar {
      margin-top: 16px;
      padding: 12px 0;
      background: transparent;
      border-radius: 0;
      animation: fadeUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) 0.2s both;
    }
    .quiz-wrong-bar-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 600;
    }
    .quiz-wrong-bar-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .quiz-wrong-bar-fill {
      height: 100%;
      background: var(--warning);
      border-radius: 2px;
      width: 0;
      transition: width 1s cubic-bezier(0.22, 1, 0.36, 1) 0.5s;
    }
    .quiz-wrong-bar-pct {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--warning);
      font-weight: 700;
      margin-top: 4px;
      text-align: right;
      letter-spacing: 0.06em;
    }

    /* Buttons */
    .quiz-btn {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      padding: 0 0 4px 0;
      border: none;
      border-bottom: 2px solid var(--text);
      border-radius: 0;
      background: transparent;
      color: var(--text);
      font-family: 'Fraunces', Georgia, serif;
      font-optical-sizing: auto;
      font-size: clamp(15px, 4.4vw, 18px);
      font-style: italic;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.22s ease,
                  border-color 0.22s ease,
                  gap 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      width: auto;
      letter-spacing: -0.012em;
    }
    .quiz-btn:hover {
      color: var(--primary);
      border-color: var(--primary);
      gap: 14px;
    }
    .quiz-btn:active { transform: none; }
    .quiz-btn-secondary {
      background: transparent;
      color: var(--text-muted);
      border: none;
      border-bottom: 1.5px solid var(--text-muted);
      font-size: clamp(13px, 3.5vw, 15px);
    }
    .quiz-btn-secondary:hover {
      color: var(--primary);
      border-color: var(--primary);
      background: transparent;
    }

    /* Results */
    .quiz-results {
      text-align: left;
      animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .quiz-results-score {
      font-family: 'Fraunces', Georgia, serif;
      font-optical-sizing: auto;
      font-size: clamp(72px, 22vw, 100px);
      font-weight: 900;
      line-height: 0.88;
      margin-bottom: 22px;
      letter-spacing: -0.045em;
      font-feature-settings: 'tnum';
    }
    .quiz-results-score .quiz-results-total {
      font-size: clamp(24px, 7vw, 32px);
      font-weight: 300;
      font-style: italic;
      color: var(--text-muted);
      letter-spacing: -0.02em;
    }
    .quiz-results-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 24px;
    }
    .quiz-results-message {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(16px, 4.8vw, 18px);
      color: var(--text);
      line-height: 1.35;
      margin-bottom: 32px;
      padding: 0;
      background: transparent;
      border-radius: 0;
      font-weight: 400;
      letter-spacing: -0.01em;
    }
    .quiz-results-missed {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 14px 0;
      border-top: 1px solid rgba(14,14,14,0.25);
      border-bottom: 1px solid rgba(14,14,14,0.25);
      margin-bottom: 26px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .quiz-results-missed span {
      display: inline-block;
      padding: 0;
      background: transparent;
      color: var(--primary);
      border-radius: 0;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      margin: 0 4px;
      font-size: 11px;
      letter-spacing: 0.08em;
    }
    .quiz-results-actions {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: flex-start;
    }

    /* Footer */
    .quiz-footer {
      margin-top: 32px;
      text-align: right;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }
    .quiz-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="quiz-container">
  <!-- Progress bar -->
  <div id="quiz-progress" class="quiz-progress hidden">
    <div class="quiz-progress-segment"></div>

  <!-- Intro -->
  <div id="quiz-intro" class="quiz-intro">

  <!-- Question area -->
  <div id="quiz-area" class="hidden"></div>

  <!-- Results -->
  <div id="quiz-results" class="quiz-results hidden"></div>

  <!-- Footer -->
  <div class="quiz-footer">

</div>

      reveal_value: '25t',
      reveal_label: '\uACE0\uC18C\uB4DD \uC0C1\uC704 10% (vs \uC800\uC18C\uB4DD \uD558\uC704 50% ~0.5t)',
      on_correct: '\uC815\uB2F5! \uC57D 25t\uC785\uB2C8\uB2E4. \uC800\uC18C\uB4DD\uAD6D \uD558\uC704 50%\uC758 50\uBC30\uC785\uB2C8\uB2E4.',
      on_wrong: '\uC2E4\uC81C\uB85C\uB294 \uC57D 25t\uC785\uB2C8\uB2E4. \uC800\uC18C\uB4DD\uAD6D \uD558\uC704 50%(~0.5t)\uC758 50\uBC30\uC5D0 \uB2EC\uD569\uB2C8\uB2E4.',
      source: 'World Inequality Database 2021'
    }
  ];

  var currentQ = 0;
  var score = 0;
  var missed = [];
  var answered = false;

  function startQuiz() {
    document.getElementById('quiz-intro').classList.add('hidden');
    document.getElementById('quiz-progress').classList.remove('hidden');
    document.getElementById('quiz-area').classList.remove('hidden');
    currentQ = 0;
    score = 0;
    missed = [];
    renderQuestion();
  }
  window.startQuiz = startQuiz;

  function renderQuestion() {
    var q = QUESTIONS[currentQ];
    answered = false;
    updateProgress();

    var letters = ['A', 'B', 'C', 'D'];
    var html = '<div class="quiz-question">';
    html += '<div class="quiz-question-number">Question ' + (currentQ + 1) + ' / 5</div>';
    html += '<div class="quiz-question-text">' + q.question + '</div>';
    html += '<div class="quiz-options">';
    for (var i = 0; i < q.options.length; i++) {
      html += '<button class="quiz-option" data-index="' + i + '" onclick="selectAnswer(' + i + ')">';
      html += '<span class="quiz-option-letter">' + letters[i] + '</span>';
      html += '<span>' + q.options[i] + '</span>';
      html += '</button>';
    }
    html += '</div>';
    html += '<div id="quiz-feedback-area"></div>';
    html += '</div>';

    document.getElementById('quiz-area').innerHTML = html;
  }

  function selectAnswer(idx) {
    if (answered) return;
    answered = true;
    var q = QUESTIONS[currentQ];
    var correct = idx === q.correct;

    if (correct) score++;
    else missed.push(q.dashboard);

    // Highlight buttons
    var btns = document.querySelectorAll('.quiz-option');
    for (var i = 0; i < btns.length; i++) {
      btns[i].disabled = true;
      if (i === q.correct) btns[i].classList.add('correct');
      else if (i === idx && !correct) btns[i].classList.add('wrong');
    }

    // Build feedback area
    var fbHtml = '';

    // Feedback text
    fbHtml += '<div class="quiz-feedback ' + (correct ? 'correct' : 'wrong') + '">';
    fbHtml += correct ? q.on_correct : q.on_wrong;
    fbHtml += '</div>';

    // Big number reveal
    fbHtml += '<div class="quiz-reveal">';
    fbHtml += '<div class="quiz-reveal-value">' + q.reveal_value + '</div>';
    fbHtml += '<div class="quiz-reveal-label">' + q.reveal_label + '</div>';
    fbHtml += '</div>';

    // Wrong percentage bar
    fbHtml += '<div class="quiz-wrong-bar">';
    fbHtml += '<div class="quiz-wrong-bar-label">' + q.wrong_pct + '%\uC758 \uC0AC\uB78C\uC774 \uC774 \uBB38\uC81C\uB97C \uD2C0\uB9BD\uB2C8\uB2E4</div>';
    fbHtml += '<div class="quiz-wrong-bar-track"><div class="quiz-wrong-bar-fill" id="wrong-fill"></div></div>';
    fbHtml += '<div class="quiz-wrong-bar-pct">' + q.wrong_pct + '%</div>';
    fbHtml += '</div>';

    // Source
    fbHtml += '<div style="font-size:10px;color:var(--text-muted);margin-top:8px;text-align:right;">Source: ' + q.source + '</div>';

    // Next button
    fbHtml += '<button class="quiz-btn" style="margin-top:16px;" onclick="nextQuestion()">';
    fbHtml += currentQ < 4 ? '\uB2E4\uC74C \uBB38\uC81C \u2192' : '\uACB0\uACFC \uBCF4\uAE30';
    fbHtml += '</button>';

    document.getElementById('quiz-feedback-area').innerHTML = fbHtml;

    // Animate wrong bar fill
    requestAnimationFrame(function () {
      var fill = document.getElementById('wrong-fill');
      if (fill) fill.style.width = q.wrong_pct + '%';
    });
  }
  window.selectAnswer = selectAnswer;

  function nextQuestion() {
    currentQ++;
    if (currentQ >= 5) {
      showResults();
    } else {
      renderQuestion();
    }
  }
  window.nextQuestion = nextQuestion;

  function updateProgress() {
    var segments = document.querySelectorAll('.quiz-progress-segment');
    for (var i = 0; i < segments.length; i++) {
      segments[i].className = 'quiz-progress-segment';
      if (i < currentQ) segments[i].classList.add('done');
      if (i === currentQ) segments[i].classList.add('active');
    }
  }

  function showResults() {
    document.getElementById('quiz-area').classList.add('hidden');
    document.getElementById('quiz-progress').classList.add('hidden');

    // Dedupe missed dashboards
    var uniqueMissed = [];
    for (var i = 0; i < missed.length; i++) {
      if (uniqueMissed.indexOf(missed[i]) < 0) uniqueMissed.push(missed[i]);
    }

    var scoreColor = score >= 4 ? 'var(--success)' : score >= 2 ? 'var(--warning)' : 'var(--danger)';
    var messages = {
      5: '\uC644\uBCBD\uD569\uB2C8\uB2E4! \uAE30\uD6C4 \uB370\uC774\uD130\uC5D0 \uB300\uD55C \uD1B5\uCC30\uB825\uC774 \uB6F0\uC5B4\uB0A9\uB2C8\uB2E4.',
      4: '\uD6CC\uB96D\uD569\uB2C8\uB2E4! \uB300\uBD80\uBD84\uC758 \uC0AC\uB78C\uBCF4\uB2E4 \uAE30\uD6C4 \uBCC0\uD654\uB97C \uC815\uD655\uD558\uAC8C \uC774\uD574\uD558\uACE0 \uC788\uC2B5\uB2C8\uB2E4.',
      3: '\uD3C9\uADE0 \uC774\uC0C1\uC785\uB2C8\uB2E4. \uD558\uC9C0\uB9CC \uC544\uC9C1 \uC9C1\uAD00\uC774 \uD2C0\uB9B0 \uC601\uC5ED\uC774 \uC788\uC2B5\uB2C8\uB2E4.',
      2: '\uB300\uBD80\uBD84\uC758 \uC0AC\uB78C\uB4E4\uACFC \uBE44\uC2B7\uD55C \uC218\uC900\uC785\uB2C8\uB2E4. \uC6B0\uB9AC\uC758 \uC9C1\uAD00\uC740 \uC790\uC8FC \uD2C0\uB9BD\uB2C8\uB2E4.',
      1: '\uAC78\uC815\uD558\uC9C0 \uB9C8\uC138\uC694. \uB300\uBD80\uBD84\uC758 \uC0AC\uB78C\uB4E4\uB3C4 \uB9CE\uC774 \uD2C0\uB9BD\uB2C8\uB2E4. \uC911\uC694\uD55C \uAC83\uC740 \uBC30\uC6B0\uB824\uB294 \uC758\uC9C0\uC785\uB2C8\uB2E4.',
      0: '\uD55C\uC2A4 \uB85C\uC2AC\uB9C1\uC774 \uB9D0\uD588\uC2B5\uB2C8\uB2E4: "\uCE68\uD32C\uC9C0\uB3C4 \uC790\uC2E0\uBCF4\uB2E4 \uBABB\uD588\uC2B5\uB2C8\uB2E4." \uB370\uC774\uD130\uB97C \uBCF4\uBA74 \uC0DD\uAC01\uC774 \uB2EC\uB77C\uC9D1\uB2C8\uB2E4.'
    };

    var dashboardLabels = {
      'DB1': 'WHO EMITS?',
      'DB3': 'ENERGY REALITY',
      'DB4': 'PROMISES vs REALITY',
      'DB5': 'CLIMATE JUSTICE'
    };

    var html = '<div class="quiz-results">';
    html += '<div class="quiz-results-score" style="color:' + scoreColor + '">' + score;
    html += '<span class="quiz-results-total"> / 5</span></div>';
    html += '<div class="quiz-results-label">\uB2F9\uC2E0\uC758 \uAE30\uD6C4 \uC9C1\uAD00 \uC810\uC218</div>';
    html += '<div class="quiz-results-message">' + (messages[score] || messages[2]) + '</div>';

    if (uniqueMissed.length > 0) {
      html += '<div class="quiz-results-missed">\uD2C0\uB9B0 \uC8FC\uC81C: ';
      for (var j = 0; j < uniqueMissed.length; j++) {
        html += '<span>' + (dashboardLabels[uniqueMissed[j]] || uniqueMissed[j]) + '</span>';
      }
      html += '</div>';
    }

    // Build narrator URL with params
    var narratorBase = 'narrator.html';
    var firstDashboard = uniqueMissed.length > 0 ? uniqueMissed[0] : 'DB1';
    var params = '?from=quiz&dashboard=' + firstDashboard + '&step=1&score=' + score;
    if (uniqueMissed.length > 0) {
      params += '&missed=' + uniqueMissed.join(',');
    }

    html += '<div class="quiz-results-actions">';
    html += '<button class="quiz-btn" onclick="goToNarrator(\'' + params + '\')">';
    html += '\uD2C0\uB9B0 \uC8FC\uC81C \uD0D0\uC0C9\uD558\uAE30 \u2192</button>';
    html += '<button class="quiz-btn quiz-btn-secondary" onclick="location.reload()">';
    html += '\uB2E4\uC2DC \uD480\uAE30</button>';
    html += '</div>';
    html += '</div>';

    var resultsEl = document.getElementById('quiz-results');
    resultsEl.innerHTML = html;
    resultsEl.classList.remove('hidden');
  }

  function goToNarrator(params) {
    window.open(narratorUrl(params), '_blank');
  }
  window.goToNarrator = goToNarrator;

  function narratorUrl(params) {
    // In production, this would be the Tableau dashboard URL
    // For standalone testing, link directly to narrator.html
    return 'narrator.html' + params;
  }

})();
</script>

</body>
</html>
